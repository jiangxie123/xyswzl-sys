# Spring 应用配置
spring.application.name=xyswzl-sys

# 服务器配置
server.port=8080

# ============================================================
# MySQL 数据源配置
# ============================================================
# 数据库连接URL：数据库名 xyswzl_db，使用 UTF-8 字符集
spring.datasource.url=jdbc:mysql://localhost:3306/xyswzl_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true

# 数据库用户名和密码（请根据实际 MySQL 配置修改）
spring.datasource.username=root
spring.datasource.password=adc20050209

# MySQL 8.x 驱动类名
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 数据库连接池配置（Spring Boot 默认 HikariCP）
spring.datasource.hikari.pool-name=HikariCP-xyswzl
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ============================================================
# Redis 配置（用于 Token 存储）
# ============================================================
# Redis 主机地址（默认本机）
spring.data.redis.host=localhost
# Redis 端口（默认 6379）
spring.data.redis.port=6379
# Redis 密码（无密码留空）
spring.data.redis.password=
# 使用第 0 号数据库
spring.data.redis.database=0
# 连接超时时间（毫秒）
spring.data.redis.connect-timeout=3000
# 读取超时时间（毫秒）
spring.data.redis.timeout=3000

# Redis 连接池配置（Lettuce）
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-wait=3000

# Token 有效期（秒），默认 24 小时 = 86400 秒
auth.token.expire-seconds=86400

# ============================================================
# MyBatis-Plus 配置
# ============================================================
# 实体类包扫描路径（用于自动映射）
mybatis-plus.type-aliases-package=com.mzy.xyswzlsys.entity
# 下划线转驼峰命名（数据库 sys_user → 实体类 sysUser）
mybatis-plus.configuration.map-underscore-to-camel-case=true
# Mapper XML 位置（如果需要手写 SQL 时使用）
mybatis-plus.mapper-locations=classpath*:/mapper/**/*.xml
# 逻辑删除（预留配置，当前项目使用物理删除）
mybatis-plus.global-config.db-config.logic-delete-field=deleted
mybatis-plus.global-config.db-config.logic-delete-value=1
mybatis-plus.global-config.db-config.logic-not-delete-value=0
# SQL 日志打印（开发环境建议开启，生产环境关闭）
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# ============================================================
# 文件上传配置
# ============================================================
# 单文件最大 10MB
spring.servlet.multipart.max-file-size=10MB
# 单次请求最大 50MB（多文件上传时的总大小）
spring.servlet.multipart.max-request-size=50MB
# 文件上传临时目录（确保目录存在或由 Spring 自动创建）
spring.servlet.multipart.file-size-threshold=2KB

# 文件上传根目录（相对路径以项目运行目录 user.dir 为基准，也可以写绝对路径如 D:/uploads）
# 上传的图片会保存在 uploads/item-images/ 下，并通过 /uploads/item-images/xxx.jpg URL 访问
# 若留空则默认为 uploads/（位于项目运行目录下）
upload.dir=uploads
