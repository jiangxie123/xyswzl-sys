# Spring 应用配置
spring.application.name=xyswzl-sys

# 服务器配置
server.port=8080

# ============================================================
# MySQL 数据源配置
# ============================================================
# 数据库连接URL：数据库名 xyswzl_db，使用 UTF-8 字符集
spring.datasource.url=jdbc:mysql://localhost:3306/xyswzl_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true

# 数据库用户名和密码（请根据实际 MySQL 配置修改）
spring.datasource.username=root
spring.datasource.password=adc20050209

# MySQL 8.x 驱动类名
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 数据库连接池配置（Spring Boot 默认 HikariCP）
spring.datasource.hikari.pool-name=HikariCP-xyswzl
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ============================================================
# MyBatis-Plus 配置
# ============================================================
# 实体类包扫描路径（用于自动映射）
mybatis-plus.type-aliases-package=com.mzy.xyswzlsys.entity
# 下划线转驼峰命名（数据库 sys_user → 实体类 sysUser）
mybatis-plus.configuration.map-underscore-to-camel-case=true
# Mapper XML 位置（如果需要手写 SQL 时使用）
mybatis-plus.mapper-locations=classpath*:/mapper/**/*.xml
# 逻辑删除（预留配置，当前项目使用物理删除）
mybatis-plus.global-config.db-config.logic-delete-field=deleted
mybatis-plus.global-config.db-config.logic-delete-value=1
mybatis-plus.global-config.db-config.logic-not-delete-value=0
# SQL 日志打印（开发环境建议开启，生产环境关闭）
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
